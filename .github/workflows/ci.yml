name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.94"
  TMPDIR: /tmp

jobs:
  rust:
    name: Rust Workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component clippy --component rustfmt
          rustc +"$RUST_TOOLCHAIN" --version
          cargo +"$RUST_TOOLCHAIN" --version

      - name: Check Formatting
        run: cargo +"$RUST_TOOLCHAIN" fmt --check

      - name: Lint
        run: cargo +"$RUST_TOOLCHAIN" clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo +"$RUST_TOOLCHAIN" test --workspace

      - name: Check Whitespace
        run: git diff --check

  dashboard-static:
    name: Dashboard Static Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Verify Static Dashboard
        run: node web/dashboard/scripts/verify.mjs
