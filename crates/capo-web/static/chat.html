<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>capo conductor chat</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    display: flex; flex-direction: column; height: 100vh;
    background: #0f1115; color: #e6e6e6;
  }
  header {
    padding: 12px 16px; border-bottom: 1px solid #2a2d34;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  .modebar { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .modebar label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
  #agentId { width: 140px; padding: 3px 6px; background: #1a1d24; color: #e6e6e6;
    border: 1px solid #2a2d34; border-radius: 6px; }
  #agentId:disabled { opacity: 0.4; }
  #transcript {
    flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;
  }
  .msg { max-width: 760px; padding: 10px 14px; border-radius: 12px; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: 3px; }
  .msg.conductor { align-self: flex-start; background: #1c2027; border: 1px solid #2a2d34; border-bottom-left-radius: 3px; }
  .msg.error { align-self: flex-start; background: #3a1d1d; border: 1px solid #6b2b2b; color: #ffb4b4; }
  .tools { margin-top: 8px; font-size: 12px; color: #9aa0ab; }
  .tools summary { cursor: pointer; }
  .tools pre { margin: 6px 0 0; padding: 8px; background: #11141a; border-radius: 6px; overflow-x: auto; }
  .meta { font-size: 11px; color: #6b7280; margin-top: 6px; }
  .thinking { align-self: flex-start; color: #9aa0ab; font-style: italic; }
  footer { padding: 12px 16px; border-top: 1px solid #2a2d34; display: flex; gap: 8px; }
  #input { flex: 1; padding: 10px 12px; background: #1a1d24; color: #e6e6e6;
    border: 1px solid #2a2d34; border-radius: 10px; resize: none; font: inherit; }
  #send { padding: 10px 20px; background: #2563eb; color: #fff; border: 0; border-radius: 10px;
    cursor: pointer; font-weight: 600; }
  #send:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
  <header>
    <h1>capo &middot; conductor chat</h1>
    <div class="modebar">
      <strong>Scope:</strong>
      <label><input type="radio" name="mode" value="all" checked /> All agents</label>
      <label><input type="radio" name="mode" value="one" /> One agent</label>
      <input id="agentId" type="text" placeholder="agent id" disabled />
    </div>
  </header>
  <div id="transcript"></div>
  <footer>
    <textarea id="input" rows="2" placeholder="Message the conductor (e.g. 'spin up a worker to create HELLO.txt')"></textarea>
    <button id="send">Send</button>
  </footer>

<script>
const transcript = document.getElementById('transcript');
const input = document.getElementById('input');
const send = document.getElementById('send');
const agentId = document.getElementById('agentId');
const modeRadios = () => document.querySelector('input[name="mode"]:checked').value;

function currentMode() {
  const scope = modeRadios();
  return { scope, agentId: scope === 'one' ? (agentId.value.trim() || null) : null };
}

document.querySelectorAll('input[name="mode"]').forEach(r => {
  r.addEventListener('change', () => { agentId.disabled = modeRadios() !== 'one'; });
});

function bubble(cls, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.textContent = text;
  transcript.appendChild(el);
  transcript.scrollTop = transcript.scrollHeight;
  return el;
}

function renderReply(data) {
  const el = bubble('conductor', data.reply && data.reply.length ? data.reply : '(no reply text)');
  if (Array.isArray(data.toolCalls) && data.toolCalls.length) {
    const det = document.createElement('details');
    det.className = 'tools';
    const names = data.toolCalls.map(t => t.name + (t.isError ? ' (error)' : '')).join(', ');
    const sum = document.createElement('summary');
    sum.textContent = 'tools: ' + names;
    det.appendChild(sum);
    const pre = document.createElement('pre');
    pre.textContent = JSON.stringify(data.toolCalls, null, 2);
    det.appendChild(pre);
    el.appendChild(det);
  }
  const meta = document.createElement('div');
  meta.className = 'meta';
  const m = data.mode || {};
  meta.textContent = `stop: ${data.stopReason || '?'} · scope: ${m.scope || '?'}${m.agentId ? ' (' + m.agentId + ')' : ''}`;
  el.appendChild(meta);
}

async function submit() {
  const message = input.value.trim();
  if (!message) return;
  const mode = currentMode();
  bubble('user', message);
  input.value = '';
  send.disabled = true;
  const thinking = document.createElement('div');
  thinking.className = 'thinking';
  thinking.textContent = 'conductor is thinking…';
  transcript.appendChild(thinking);
  transcript.scrollTop = transcript.scrollHeight;
  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ message, mode: mode.scope, agent_id: mode.agentId }),
    });
    thinking.remove();
    const data = await resp.json();
    if (!resp.ok || data.ok === false) {
      bubble('error', 'error: ' + (data.error || resp.statusText || 'request failed'));
    } else {
      renderReply(data);
    }
  } catch (e) {
    thinking.remove();
    bubble('error', 'error: ' + e.message);
  } finally {
    send.disabled = false;
    input.focus();
  }
}

send.addEventListener('click', submit);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
});
input.focus();
</script>
</body>
</html>
