<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>capo conductor console</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: #0f1115; color: #e6e6e6;
    display: grid; grid-template-columns: 260px 1fr; height: 100vh; overflow: hidden;
  }

  /* ---------- sidebar ---------- */
  #sidebar {
    border-right: 1px solid #2a2d34; background: #0c0e12;
    display: flex; flex-direction: column; min-height: 0;
  }
  #sidebar .head {
    padding: 12px 14px; border-bottom: 1px solid #2a2d34;
    display: flex; align-items: center; justify-content: space-between;
  }
  #sidebar .head h2 { font-size: 13px; margin: 0; text-transform: uppercase; letter-spacing: .06em; color: #9aa0ab; }
  #poll-dot { width: 8px; height: 8px; border-radius: 50%; background: #3a3f4a; transition: background .2s; }
  #poll-dot.live { background: #34d399; }
  #agent-list { flex: 1; overflow-y: auto; padding: 6px; }
  .agent {
    padding: 8px 10px; border-radius: 8px; cursor: pointer; margin-bottom: 4px;
    border: 1px solid transparent; display: flex; flex-direction: column; gap: 3px;
  }
  .agent:hover { background: #15181f; }
  .agent.sel { background: #15181f; border-color: #2563eb; }
  .agent .name { font-weight: 600; display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .agent .role { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; }
  .agent .sub { font-size: 11px; color: #9aa0ab; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* A4 — conductor->worker one-level tree: workers render indented under the
     conductor root with a left connector. (No parent field in the read model,
     so this conductor=root / rest=workers indent is the heuristic.) */
  .agent.is-child { margin-left: 14px; border-left: 1px solid #2a2d34; border-radius: 0 8px 8px 0; padding-left: 14px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; background: #6b7280; }
  .dot.running, .dot.active { background: #34d399; animation: pulse 1.4s infinite; }
  .dot.idle, .dot.completed, .dot.done { background: #60a5fa; }
  .dot.blocked, .dot.error, .dot.timed { background: #f87171; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

  /* ---------- main ---------- */
  #main { display: flex; flex-direction: column; min-height: 0; min-width: 0; }
  header {
    padding: 10px 16px; border-bottom: 1px solid #2a2d34;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  .tabs { display: flex; gap: 4px; margin-left: auto; }
  .tab {
    padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 13px;
    background: transparent; color: #9aa0ab; border: 1px solid #2a2d34;
  }
  .tab.active { background: #1c2027; color: #e6e6e6; border-color: #2563eb; }
  .modebar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #9aa0ab; }
  .modebar label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
  #agentId { width: 130px; padding: 3px 6px; background: #1a1d24; color: #e6e6e6;
    border: 1px solid #2a2d34; border-radius: 6px; }
  #agentId:disabled { opacity: 0.4; }

  .pane { flex: 1; min-height: 0; display: none; flex-direction: column; }
  .pane.show { display: flex; }

  /* chat pane */
  #transcript { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 760px; padding: 9px 13px; border-radius: 12px; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: 3px; }
  .msg.conductor { align-self: flex-start; background: #1c2027; border: 1px solid #2a2d34; border-bottom-left-radius: 3px; }
  .msg.error { align-self: flex-start; background: #3a1d1d; border: 1px solid #6b2b2b; color: #ffb4b4; font-family: ui-monospace, monospace; font-size: 12.5px; }
  .tools { margin-top: 8px; font-size: 12px; color: #9aa0ab; }
  .tools summary { cursor: pointer; }
  .tools pre { margin: 6px 0 0; padding: 8px; background: #11141a; border-radius: 6px; overflow-x: auto; }
  .meta { font-size: 11px; color: #6b7280; margin-top: 6px; }

  /* live activity area, attached under in-flight user msg */
  .activity {
    align-self: stretch; max-width: 760px; margin: 2px 0 4px;
    border: 1px solid #2a2d34; border-radius: 10px; background: #0c0e12; overflow: hidden;
  }
  .activity .act-head {
    padding: 6px 12px; font-size: 11px; color: #9aa0ab; border-bottom: 1px solid #1c2027;
    display: flex; align-items: center; gap: 8px;
  }
  .spinner { width: 9px; height: 9px; border-radius: 50%; border: 2px solid #2563eb; border-top-color: transparent; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .act-body { max-height: 240px; overflow-y: auto; padding: 4px 0; }
  .ev { display: flex; gap: 8px; padding: 3px 12px; font-size: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .ev .k { color: #60a5fa; flex: 0 0 auto; }
  .ev .s { color: #6b7280; flex: 0 0 auto; }
  .ev .t { color: #cbd2dc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ev.tool .k { color: #34d399; }
  .ev.file .k { color: #fbbf24; }
  .ev.prose .k { color: #a78bfa; }
  .ev.prose .t { white-space: normal; overflow: visible; text-overflow: clip; }
  /* Low-level plumbing (permissions/grants/lifecycle) hidden until "details". */
  .ev.plumbing { display: none; }
  body.show-details .ev.plumbing { display: flex; opacity: .5; }

  /* agent detail pane */
  #detail { flex: 1; overflow-y: auto; padding: 16px; }
  #detail .empty { color: #6b7280; padding: 40px; text-align: center; }
  #detail h3 { margin: 0 0 4px; font-size: 16px; }
  #detail .dmeta { color: #9aa0ab; font-size: 12px; margin-bottom: 16px; }
  .ditem { padding: 8px 12px; border-radius: 8px; background: #14171d; margin-bottom: 6px; border: 1px solid #1f232b; }
  .ditem .dk { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: #6b7280; margin-bottom: 2px; }
  .ditem .dt { white-space: pre-wrap; word-wrap: break-word; font-size: 13px; }
  #detail .section { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: #6b7280; margin: 18px 0 8px; }

  /* A1 — per-agent action bar (steer/interrupt/stop) in the detail pane. */
  .actionbar { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin: 4px 0 12px; }
  .actionbar button {
    padding: 5px 12px; background: #1c2027; color: #e6e6e6; border: 1px solid #2a2d34;
    border-radius: 8px; cursor: pointer; font: inherit; font-size: 12px; font-weight: 600;
  }
  .actionbar button:hover { background: #232733; }
  .actionbar button:disabled { opacity: 0.5; cursor: default; }
  .act-status { font-size: 12px; }
  .act-status.ok { color: #34d399; }
  .act-status.err { color: #f87171; font-family: ui-monospace, monospace; }
  .act-note { flex-basis: 100%; font-size: 11px; color: #6b7280; }

  footer { padding: 12px 16px; border-top: 1px solid #2a2d34; display: flex; gap: 8px; }
  #input { flex: 1; padding: 10px 12px; background: #1a1d24; color: #e6e6e6;
    border: 1px solid #2a2d34; border-radius: 10px; resize: none; font: inherit; }
  #send { padding: 10px 20px; background: #2563eb; color: #fff; border: 0; border-radius: 10px;
    cursor: pointer; font-weight: 600; }
  #send:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
  <!-- ============ SIDEBAR: agents ============ -->
  <aside id="sidebar">
    <div class="head">
      <h2>Agents</h2>
      <div id="poll-dot" title="dashboard polling"></div>
    </div>
    <div id="agent-list"><div style="padding:12px;color:#6b7280;font-size:12px">loading…</div></div>
  </aside>

  <!-- ============ MAIN ============ -->
  <section id="main">
    <header>
      <h1>capo &middot; conductor console</h1>
      <div class="modebar">
        <span>scope:</span>
        <label><input type="radio" name="mode" value="all" checked /> all</label>
        <label><input type="radio" name="mode" value="one" /> one</label>
        <input id="agentId" type="text" placeholder="agent id" disabled />
        <label style="margin-left:12px" title="show the low-level permission/grant/lifecycle plumbing events"><input type="checkbox" id="details-toggle" /> details</label>
      </div>
      <div class="tabs">
        <button class="tab active" data-pane="chat">Conductor</button>
        <button class="tab" data-pane="detail" id="tab-detail">Agent</button>
      </div>
    </header>

    <!-- chat pane -->
    <div class="pane show" id="pane-chat">
      <div id="transcript"></div>
      <footer>
        <textarea id="input" rows="2" placeholder="Message the conductor (e.g. 'fan out to 3 agents, each say a random fruit, choose the best')"></textarea>
        <button id="send">Send</button>
      </footer>
    </div>

    <!-- agent detail pane -->
    <div class="pane" id="pane-detail">
      <div id="detail"><div class="empty">Select an agent from the sidebar to inspect its thread and live events.</div></div>
    </div>
  </section>

<script>
"use strict";

// ---------------------------------------------------------------------------
// helpers
// ---------------------------------------------------------------------------
function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}
function statusClass(s) {
  s = (s || '').toLowerCase();
  if (s.includes('run') || s.includes('active')) return 'running';
  if (s.includes('block') || s.includes('error') || s.includes('timed')) return 'blocked';
  if (s.includes('done') || s.includes('complete')) return 'completed';
  return 'idle';
}

// Robust fetch: never throws on non-JSON / non-OK. Returns {ok, data, text, status}.
async function safeFetch(url, opts) {
  let resp;
  try {
    resp = await fetch(url, opts);
  } catch (e) {
    return { ok: false, data: null, text: 'network error: ' + e.message, status: 0 };
  }
  const body = await resp.text();
  let data = null;
  try { data = body ? JSON.parse(body) : null; } catch (_) { data = null; }
  return { ok: resp.ok, data, text: body, status: resp.status };
}

// A1 — fire a per-agent intent command (steer/interrupt/stop) and report the
// ok/error result inline via `statusEl`. `agentId` must be the agent's NAME/id
// (the /api/commands handler matches it as `agent_name`), NOT the sessionId.
// `payload` is {message} for steer or {reason} for interrupt/stop.
async function sendAgentCommand(kind, agentId, payload, statusEl) {
  statusEl.className = 'act-status';
  statusEl.textContent = '…';
  const res = await safeFetch('/api/commands', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ kind, agent: agentId, ...payload }),
  });
  // Reuse the submit() ok/error idiom: ok unless HTTP failed or ok===false.
  if (res.ok && !(res.data && res.data.ok === false)) {
    statusEl.className = 'act-status ok';
    statusEl.textContent = kind.replace(/_/g, ' ') + ' recorded';
  } else {
    const errText = (res.data && (res.data.error || res.data.message)) ||
                    res.text || ('HTTP ' + res.status);
    statusEl.className = 'act-status err';
    statusEl.textContent = 'error (HTTP ' + res.status + '): ' + String(errText).slice(0, 200);
  }
}

// Pull a short readable snippet out of an event payload_json.
function eventSnippet(ev) {
  let p = ev.payload_json;
  if (typeof p === 'string') { try { p = JSON.parse(p); } catch (_) { return String(ev.payload_json).slice(0, 160); } }
  if (!p || typeof p !== 'object') return '';
  // common fields across capo event payloads
  const cand = p.content ?? p.text ?? p.message ?? p.summary ?? p.goal ??
               p.path ?? p.tool_name ?? p.name ?? p.result ?? p.title;
  if (cand != null) return String(cand).replace(/\s+/g, ' ').slice(0, 200);
  return JSON.stringify(p).slice(0, 160);
}
function eventCategory(kind) {
  kind = (kind || '').toLowerCase();
  if (kind.includes('tool')) return 'tool';
  if (kind.includes('write') || kind.includes('file') || kind.includes('fs')) return 'file';
  return '';
}

// The conductor's long-lived session id (set once a turn starts) so the feed can
// distinguish the conductor's own lines from worker sessions it spawned.
let conductorSessionId = null;
function setConductorSession(sid) { if (sid) conductorSessionId = sid; }

// Short, stable label for a session: the conductor, or a trimmed worker id.
function actorLabel(ev) {
  const sid = ev.session_id || '';
  const agent = (ev.agent_id || '').replace(/^agent-/, '');
  if (agent === 'conductor') return 'conductor';
  if (agent) return 'worker ' + agent;
  // The conductor's own long-lived session.
  if ((conductorSessionId && sid === conductorSessionId) || /conductor-web$/.test(sid)) return 'conductor';
  // Worker sessions are `session-conductor-<name>-<hexhash>`; show just <name>.
  const m = sid.match(/^session-conductor-(.+)-[0-9a-f]{8,}$/);
  if (m) return 'worker ' + m[1];
  const trimmed = sid.replace(/^session-/, '');
  return trimmed ? 'worker ' + trimmed.slice(0, 24) : 'worker';
}

// Render a SINGLE legible line for one event (acceptance #2): the conductor's
// words, a tool call with its args, or a worker's activity/result -- NOT a raw
// event kind. Returns { who, text } or null when an event carries nothing
// worth surfacing as a line.
function legibleLine(ev) {
  let p = ev.payload_json;
  if (typeof p === 'string') { try { p = JSON.parse(p); } catch (_) { p = {}; } }
  if (!p || typeof p !== 'object') p = {};
  const kind = (ev.kind || '').toLowerCase();
  const nk = (p.normalized_kind || '').toLowerCase();
  const role = (p.role || '').toLowerCase();
  const who = actorLabel(ev);
  const clip = (s) => String(s).replace(/\s+/g, ' ').trim().slice(0, 240);

  // PLUMBING: permission/grant/request-handled + contentless summary updates.
  // Real, but noise for the default view — hidden behind the "details" toggle.
  const isPlumbing = kind.includes('permission') || kind.includes('capability') ||
    kind.includes('grant') || kind.includes('request_handled') ||
    kind.includes('registered') || kind.includes('session.started') ||
    (kind.includes('summary_updated') && !(p.content && p.content !== 'none'));

  // 1. AGENT PROSE first (so a summary_updated that carries real words is prose,
  //    not plumbing): the conductor's / a worker's real words.
  if (p.content && p.content !== 'none' &&
      (nk.includes('item_delta') || nk.includes('item_completed') ||
       kind.includes('summary') || role === 'assistant' || role === 'user')) {
    // `full` marks an AUTHORITATIVE complete message (item_completed or a full
    // assistant/user role payload) vs a streaming delta. The coalescer REPLACES
    // the accumulated partials with a full message instead of appending (F2).
    const full = nk.includes('item_completed') || role === 'assistant' || role === 'user';
    return { who, text: clip(p.content), cat: 'prose', full };
  }

  // 2. TOOL CALLS: "→ start_agent(task=...)" / observed tool results.
  const isTool = kind.includes('tool') || nk.includes('tool_call');
  if (isTool) {
    let tool = p.tool_name || p.name || p.title;
    if (!tool || tool === 'none') {
      // An unnamed tool event (e.g. a streamed tool_call update with no name) is
      // noise unless it carries a result — demote to plumbing.
      if (!(p.content && p.content !== 'none')) return { who, text: '→ tool', cat: 'plumbing' };
      tool = 'tool';
    }
    tool = String(tool).replace(/^mcp__capo__/, '');
    let args = '';
    const arg = p.task ?? p.goal ?? p.path ?? p.query ?? p.command;
    if (arg != null) args = '(' + clip(arg).slice(0, 120) + ')';
    const status = p.status && p.status !== 'none' ? ' [' + p.status + ']' : '';
    const result = p.content && p.content !== 'none' ? ' → ' + clip(p.content) : '';
    return { who, text: '→ ' + tool + args + status + result, cat: 'tool' };
  }

  if (isPlumbing) {
    const tail = (ev.kind || 'event').split('.').pop().replace(/_/g, ' ');
    return { who, text: tail, cat: 'plumbing' };
  }

  // 3. Other text-bearing payloads (goal/summary/reason/plan).
  const cand = p.content ?? p.summary ?? p.message ?? p.goal ?? p.reason ?? p.detail;
  if (cand != null && cand !== 'none') return { who, text: clip(cand), cat: 'prose' };

  // 4. Fall back to a humanized event kind.
  const tail = (ev.kind || 'event').split('.').pop().replace(/_/g, ' ');
  return { who, text: tail, cat: 'plumbing' };
}

// ---------------------------------------------------------------------------
// global resume watermark across the whole event log (so each turn resumes
// strictly after the last sequence the chat activity already saw)
// ---------------------------------------------------------------------------
let lastSeq = 0;
function bumpSeq(n) { if (typeof n === 'number' && n > lastSeq) lastSeq = n; }

// ---------------------------------------------------------------------------
// CHAT (conductor)
// ---------------------------------------------------------------------------
const transcript = document.getElementById('transcript');
const input = document.getElementById('input');
const send = document.getElementById('send');
const agentId = document.getElementById('agentId');
const modeVal = () => document.querySelector('input[name="mode"]:checked').value;

document.querySelectorAll('input[name="mode"]').forEach(r => {
  r.addEventListener('change', () => { agentId.disabled = modeVal() !== 'one'; });
});
const detailsToggle = document.getElementById('details-toggle');
if (detailsToggle) detailsToggle.addEventListener('change', () => {
  document.body.classList.toggle('show-details', detailsToggle.checked);
});

function bubble(cls, text) {
  const e = el('div', 'msg ' + cls, text);
  transcript.appendChild(e);
  transcript.scrollTop = transcript.scrollHeight;
  return e;
}

function renderReply(data) {
  const e = bubble('conductor', (data.reply && data.reply.length) ? data.reply : '(no reply text)');
  if (Array.isArray(data.toolCalls) && data.toolCalls.length) {
    const det = el('details', 'tools');
    const names = data.toolCalls.map(t => t.name + (t.isError ? ' (error)' : '')).join(', ');
    det.appendChild(el('summary', null, 'tools: ' + names));
    det.appendChild(el('pre', null, JSON.stringify(data.toolCalls, null, 2)));
    e.appendChild(det);
  }
  const m = data.mode || {};
  const scope = typeof m === 'string' ? m : (m.scope || data.mode || '?');
  e.appendChild(el('div', 'meta', `stop: ${data.stopReason || '?'} · scope: ${scope}`));
}

// Live activity area shown under the in-flight user message during a turn.
function makeActivity() {
  const wrap = el('div', 'activity');
  const head = el('div', 'act-head');
  head.appendChild(el('div', 'spinner'));
  const label = el('span', null, 'conductor working…');
  head.appendChild(label);
  const count = el('span', null, '');
  count.style.marginLeft = 'auto';
  count.style.color = '#6b7280';
  head.appendChild(count);
  wrap.appendChild(head);
  const body = el('div', 'act-body');
  wrap.appendChild(body);
  transcript.appendChild(wrap);
  transcript.scrollTop = transcript.scrollHeight;

  let n = 0, lastRow = null, lastWho = null, lastText = null, lastCat = null;
  return {
    addEvent(ev) {
      n++;
      count.textContent = n + ' event' + (n === 1 ? '' : 's');
      const line = legibleLine(ev);
      if (!line) return;
      const atBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 40;
      // Coalesce consecutive PROSE from the same actor (the model streams a
      // message as many tiny deltas: "The" / "file…" / "HELLO").
      if (line.cat === 'prose' && lastRow && lastCat === 'prose' && lastWho === line.who) {
        // F2 — avoid prose doubling. An item_completed (full message) is the
        // authoritative text: REPLACE the accumulated partial deltas with it.
        // For a streaming delta, append but GUARD against overlap/restate so a
        // chunk already covered by what we have isn't doubled.
        if (line.full) {
          lastText = line.text;                              // completed: replace
        } else if (lastText.endsWith(line.text) || lastText.includes(line.text)) {
          /* delta already covered — skip to avoid doubling */
        } else {
          lastText = (lastText + ' ' + line.text).replace(/\s+/g, ' ').trim();
        }
        lastRow.querySelector('.t').textContent = lastText;
      } else if (lastRow && lastWho === line.who && lastText === line.text && lastCat === line.cat) {
        // Dedupe: identical consecutive line (events frequently arrive twice).
      } else {
        const row = el('div', 'ev ' + line.cat);
        row.appendChild(el('span', 'k', line.who));
        row.appendChild(el('span', 't', line.text));
        body.appendChild(row);
        lastRow = row; lastWho = line.who; lastText = line.text; lastCat = line.cat;
      }
      if (atBottom) body.scrollTop = body.scrollHeight;
      transcript.scrollTop = transcript.scrollHeight;
    },
    finish(label2) {
      head.querySelector('.spinner').remove();
      label.textContent = label2 || 'turn complete';
    },
  };
}

// Open an SSE tail for the chat activity. Returns the EventSource.
function openChatStream(activity) {
  const from = lastSeq; // resume strictly after what we already have
  const es = new EventSource('/api/events?from=' + from);
  es.addEventListener('event', (m) => {
    let ev;
    try { ev = JSON.parse(m.data).params.event; } catch (_) { return; }
    if (!ev) return;
    bumpSeq(ev.sequence);
    activity.addEvent(ev);
  });
  es.onerror = () => { /* keep-alive hiccups; browser auto-reconnects */ };
  return es;
}

async function submit() {
  const message = input.value.trim();
  if (!message) return;
  const scope = modeVal();
  const agent = scope === 'one' ? (agentId.value.trim() || null) : null;

  bubble('user', message);
  input.value = '';
  send.disabled = true;

  const activity = makeActivity();
  const es = openChatStream(activity);

  const res = await safeFetch('/api/chat', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ message, mode: scope, agent_id: agent }),
  });

  // close the live stream once the turn returns; give it a beat to flush trailers
  setTimeout(() => es.close(), 600);
  activity.finish();

  if (!res.ok || (res.data && res.data.ok === false)) {
    const errText = (res.data && (res.data.error || res.data.message)) ||
                    res.text || ('HTTP ' + res.status);
    bubble('error', 'error (HTTP ' + res.status + '): ' + errText);
  } else if (res.data) {
    setConductorSession(res.data.sessionId);
    renderReply(res.data);
    bumpSeq(res.data.nextSequence);
  } else {
    bubble('error', 'unexpected non-JSON response: ' + (res.text || '(empty)'));
  }

  send.disabled = false;
  input.focus();
}

send.addEventListener('click', submit);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
});

// ---------------------------------------------------------------------------
// TABS
// ---------------------------------------------------------------------------
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => showPane(t.dataset.pane));
});
function showPane(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.pane === name));
  document.getElementById('pane-chat').classList.toggle('show', name === 'chat');
  document.getElementById('pane-detail').classList.toggle('show', name === 'detail');
}

// ---------------------------------------------------------------------------
// SIDEBAR: poll /api/dashboard every 2s
// ---------------------------------------------------------------------------
const agentListEl = document.getElementById('agent-list');
const pollDot = document.getElementById('poll-dot');
let agentsById = {};
let selectedId = null;

function renderAgents(agents) {
  agentsById = {};
  agentListEl.innerHTML = '';
  if (!agents.length) {
    agentListEl.appendChild(el('div', null, 'no agents yet')).style.cssText = 'padding:12px;color:#6b7280;font-size:12px';
    return;
  }
  // Build a single agent row. `isChild` indents it under the conductor root.
  const buildRow = (a, isChild) => {
    agentsById[a.id] = a; // keep EVERY agent keyed (root + children) so selection works
    const row = el('div', 'agent' + (a.id === selectedId ? ' sel' : '') + (isChild ? ' is-child' : ''));
    const name = el('div', 'name');
    name.appendChild(el('span', 'dot ' + statusClass(a.status))); // real lifecycle dot
    name.appendChild(el('span', null, a.name || a.id));
    row.appendChild(name);
    const isConductor = /conductor/i.test(a.id) || /conductor/i.test(a.name || '');
    row.appendChild(el('div', 'role', isConductor ? 'conductor' : 'worker'));
    const sub = (a.status || '') + (a.goal ? ' · ' + a.goal : (a.result ? ' · ' + a.result : ''));
    row.appendChild(el('div', 'sub', sub));
    row.addEventListener('click', () => selectAgent(a.id));
    agentListEl.appendChild(row);
  };

  // A4 — one-level conductor->worker tree. The read model has NO parent field,
  // so this conductor=root / rest=workers heuristic is the intended fork-free
  // grouping. If no conductor is present yet, fall back to the flat list.
  const isConductorAgent = (a) => /conductor/i.test(a.id) || /conductor/i.test(a.name || '');
  const conductor = agents.find(isConductorAgent);
  if (conductor) {
    buildRow(conductor, false); // root
    agents.filter(a => a !== conductor).forEach(a => buildRow(a, true)); // indented workers
  } else {
    agents.forEach(a => buildRow(a, false)); // flat fallback
  }
}

async function pollDashboard() {
  const res = await safeFetch('/api/dashboard');
  pollDot.classList.toggle('live', res.ok && res.data);
  if (res.ok && res.data && Array.isArray(res.data.agents)) {
    renderAgents(res.data.agents);
    // if the selected agent is open, its live event tail keeps updating it.
  }
}
setInterval(pollDashboard, 2000);
pollDashboard();

// ---------------------------------------------------------------------------
// AGENT DETAIL: thread snapshot + own live event tail
// ---------------------------------------------------------------------------
const detailEl = document.getElementById('detail');
let detailES = null;
let detailSeq = 0;
let detailEventsBox = null;

async function selectAgent(id) {
  selectedId = id;
  showPane('detail');
  document.querySelectorAll('.agent').forEach(r => r.classList.remove('sel'));
  // re-mark selection on next render; also mark immediately if present
  [...agentListEl.children].forEach(c => {
    const nm = c.querySelector('.name span:last-child');
    if (nm && (nm.textContent === (agentsById[id]?.name || id))) c.classList.add('sel');
  });

  const a = agentsById[id] || {};
  const sessionId = a.sessionId || null;

  detailEl.innerHTML = '';
  detailEl.appendChild(el('h3', null, a.name || id));
  const meta = el('div', 'dmeta');
  meta.textContent = [a.status, a.adapter, sessionId ? 'session ' + sessionId : 'no session', a.runId ? 'run ' + a.runId : '']
    .filter(Boolean).join(' · ');
  detailEl.appendChild(meta);
  if (a.goal) { const g = el('div', 'ditem'); g.appendChild(el('div', 'dk', 'goal')); g.appendChild(el('div', 'dt', a.goal)); detailEl.appendChild(g); }
  if (a.result) { const r = el('div', 'ditem'); r.appendChild(el('div', 'dk', 'result')); r.appendChild(el('div', 'dt', a.result)); detailEl.appendChild(r); }

  // A1 — per-agent action bar: steer / interrupt / stop. Rendered only when the
  // agent has a live session. Buttons target `id` (the agent NAME, captured in
  // the closure) so the right agent is acted on even if selection changes.
  if (sessionId) {
    const bar = el('div', 'actionbar');
    const status = el('span', 'act-status');
    const mkBtn = (label, run) => {
      const b = el('button', null, label);
      b.addEventListener('click', async () => {
        // prompt() is synchronous and only fires on click, so it never blocks render.
        const payload = run();
        if (payload == null) return; // user cancelled the prompt
        [...bar.querySelectorAll('button')].forEach(x => x.disabled = true);
        try { await sendAgentCommand(payload.kind, id, payload.body, status); }
        finally { [...bar.querySelectorAll('button')].forEach(x => x.disabled = false); }
      });
      return b;
    };
    bar.appendChild(mkBtn('Steer', () => {
      const message = prompt('Steer message for ' + (a.name || id));
      return message == null ? null : { kind: 'steer_agent', body: { message } };
    }));
    bar.appendChild(mkBtn('Interrupt', () => {
      const reason = prompt('Interrupt reason', 'operator interrupt');
      return reason == null ? null : { kind: 'interrupt_agent', body: { reason } };
    }));
    bar.appendChild(mkBtn('Stop', () => {
      const reason = prompt('Stop reason', 'operator stop');
      return reason == null ? null : { kind: 'stop_agent', body: { reason } };
    }));
    bar.appendChild(status);
    bar.appendChild(el('div', 'act-note',
      'Steer/interrupt/stop currently record intent server-side; they become live ' +
      'once the in-flight turn registry lands.'));
    detailEl.appendChild(bar);
  }

  // close any prior tail
  if (detailES) { detailES.close(); detailES = null; }
  detailSeq = 0;

  if (!sessionId) {
    detailEl.appendChild(el('div', 'empty', 'This agent has no session yet.'));
    return;
  }

  // --- thread snapshot ---
  detailEl.appendChild(el('div', 'section', 'thread'));
  const threadBox = el('div');
  detailEl.appendChild(threadBox);
  const tr = await safeFetch('/api/thread?session=' + encodeURIComponent(sessionId) + '&from=0');
  if (tr.ok && tr.data && Array.isArray(tr.data.turns)) {
    let any = false;
    tr.data.turns.forEach(turn => {
      (turn.items || []).forEach(it => {
        detailSeq = Math.max(detailSeq, it.sequence || 0);
        const text = (it.text || '').trim();
        // Skip redacted/raw kind labels ("adapter.item_delta (streaming)",
        // "adapter.tool_call_requested (updated)") — the real prose is in
        // sibling items; showing the labels is just noise.
        if (!text || /^adapter\./.test(text)) return;
        any = true;
        const d = el('div', 'ditem');
        const label = (it.eventKind || it.kind || 'item').split('.').pop().replace(/_/g, ' ');
        d.appendChild(el('div', 'dk', label));
        d.appendChild(el('div', 'dt', text));
        threadBox.appendChild(d);
      });
    });
    if (!any) threadBox.appendChild(el('div', 'empty', 'no thread text yet — watch the live events below as the turn runs.'));
    if (typeof tr.data.nextSequence === 'number') detailSeq = Math.max(detailSeq, tr.data.nextSequence - 1);
  } else {
    threadBox.appendChild(el('div', 'empty', 'thread unavailable: ' + (tr.text || ('HTTP ' + tr.status)).slice(0, 200)));
  }

  // --- live events for THIS session ---
  detailEl.appendChild(el('div', 'section', 'live events'));
  detailEventsBox = el('div', 'act-body');
  detailEventsBox.style.maxHeight = 'none';
  detailEl.appendChild(detailEventsBox);

  detailES = new EventSource('/api/events?session=' + encodeURIComponent(sessionId) + '&from=' + detailSeq);
  detailES.addEventListener('event', (m) => {
    let ev;
    try { ev = JSON.parse(m.data).params.event; } catch (_) { return; }
    if (!ev || selectedId !== id) return;
    detailSeq = Math.max(detailSeq, ev.sequence || 0);
    bumpSeq(ev.sequence);
    const line = legibleLine(ev);
    if (!line) return;
    const row = el('div', 'ev ' + line.cat);
    row.appendChild(el('span', 'k', line.who));
    row.appendChild(el('span', 't', line.text));
    detailEventsBox.appendChild(row);
    detailEventsBox.scrollTop = detailEventsBox.scrollHeight;
  });
  detailES.onerror = () => {};
}

// ---------------------------------------------------------------------------
// A3 — Reload-survival: on page load, replay the durable event log ONCE into a
// rebuilt conductor activity feed so a browser refresh doesn't lose the
// conversation. Reuses makeActivity()/legibleLine so the rebuild looks IDENTICAL
// to the live feed, and bumpSeq() per event so the live tail (openChatStream,
// which starts at lastSeq) resumes strictly AFTER the backlog — no double-render.
//
// /api/events is a long-lived SSE stream that NEVER closes (it tails live after
// replaying the backlog), so `await resp.text()` would hang. Instead we stream
// the body with a reader, parse `data:` frames incrementally, and stop after the
// backlog drains — detected by a short idle gap (no new bytes for ~500ms once we
// have seen >=1 frame) then cancel the reader. This is the simplest robust way
// to read just the backlog of a never-closing stream.
async function replayConductorBacklog() {
  let resp;
  try { resp = await fetch('/api/events?from=0'); } catch (_) { return; }
  if (!resp.ok || !resp.body) return;

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  const activity = makeActivity();
  activity.finish('history'); // it's replayed backlog, not an in-flight turn
  let buf = '', seen = 0, idleTimer = null, done = false;

  const stop = () => { if (!done) { done = true; try { reader.cancel(); } catch (_) {} } };
  const armIdle = () => {
    if (idleTimer) clearTimeout(idleTimer);
    // Once we've drained the backlog, the live stream goes quiet — stop then.
    if (seen > 0) idleTimer = setTimeout(stop, 500);
  };

  // Parse complete `data:` lines out of the SSE buffer (mirrors openChatStream's
  // per-event handling: JSON.parse(data).params.event -> bumpSeq + addEvent).
  const flush = () => {
    let nl;
    while ((nl = buf.indexOf('\n')) >= 0) {
      const line = buf.slice(0, nl).replace(/\r$/, '');
      buf = buf.slice(nl + 1);
      if (!line.startsWith('data:')) continue;
      let ev;
      try { ev = JSON.parse(line.slice(5).trim()).params.event; } catch (_) { continue; }
      if (!ev) continue;
      bumpSeq(ev.sequence);
      activity.addEvent(ev);
      seen++;
    }
  };

  try {
    while (!done) {
      const { value, done: rdone } = await reader.read();
      if (rdone) break;
      buf += decoder.decode(value, { stream: true });
      flush();
      armIdle();
    }
  } catch (_) { /* reader cancelled on idle — expected */ }
  if (idleTimer) clearTimeout(idleTimer);
}

// Run the replay on load, independent of the 2s dashboard poll. Disable `send`
// until it settles so a mid-replay submit can't race lastSeq (bumpSeq is
// monotonic, so once replay finishes the live tail resumes after the backlog).
send.disabled = true;
replayConductorBacklog().finally(() => { send.disabled = false; input.focus(); });

input.focus();
</script>
</body>
